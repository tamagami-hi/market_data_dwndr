<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="TickVault">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4aa3ff"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="30" height="30" rx="7" fill="#0b0f14"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="6.5" fill="none" stroke="url(#g)" stroke-width="1.5"/>
  <!-- candlesticks (captured ticks) -->
  <g stroke="url(#g)" stroke-width="2.2" stroke-linecap="round">
    <line x1="10" y1="9" x2="10" y2="23"/>
    <line x1="16" y1="6" x2="16" y2="26"/>
    <line x1="22" y1="11" x2="22" y2="21"/>
  </g>
  <g fill="#e8eef5">
    <rect x="8.6" y="12" width="2.8" height="7" rx="1"/>
    <rect x="14.6" y="10" width="2.8" height="10" rx="1"/>
    <rect x="20.6" y="13.5" width="2.8" height="5.5" rx="1"/>
  </g>
</svg>
