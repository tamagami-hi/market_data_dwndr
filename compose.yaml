name: market-data-dwndr

x-service-security: &service-security
  init: true
  restart: unless-stopped
  read_only: true
  user: "${APP_UID:-10001}:${APP_GID:-10001}"
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  backend:
    container_name: market-data-dwndr-backend
    <<: *service-security
    stop_grace_period: 30s
    image: market-data-dwndr-backend:${APP_VERSION:-local}
    build:
      context: ./backend
      args:
        APP_UID: ${APP_UID:-10001}
        APP_GID: ${APP_GID:-10001}
    env_file:
      - ./backend/.env
    environment:
      HTTP_HOST: 0.0.0.0
    ports:
      - name: backend-http
        target: ${HTTP_PORT:?Set HTTP_PORT in backend/.env}
        published: ${HTTP_PORT:?Set HTTP_PORT in backend/.env}
        host_ip: ${HOST_BIND_ADDRESS:?Set HOST_BIND_ADDRESS in backend/.env}
        protocol: tcp
    volumes:
      - type: bind
        source: ${MARKET_DATA_PATH:?Set MARKET_DATA_PATH in backend/.env}
        target: ${MARKET_DATA_PATH:?Set MARKET_DATA_PATH in backend/.env}
        bind:
          create_host_path: false
      - type: bind
        source: ${ARCHIVE_DATA_PATH:?Set ARCHIVE_DATA_PATH in backend/.env}
        target: ${ARCHIVE_DATA_PATH:?Set ARCHIVE_DATA_PATH in backend/.env}
        bind:
          create_host_path: false
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import os, urllib.request;
          urllib.request.urlopen('http://127.0.0.1:' + os.environ['HTTP_PORT'] + '/health', timeout=3)
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    container_name: market-data-dwndr-frontend
    <<: *service-security
    image: market-data-dwndr-frontend:${APP_VERSION:-local}
    build:
      context: ./frontend
      args:
        APP_UID: ${APP_UID:-10001}
        APP_GID: ${APP_GID:-10001}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:?Set NEXT_PUBLIC_BACKEND_URL in frontend/.env.local}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-TickVault}
    env_file:
      - ./frontend/.env.local
    ports:
      - name: frontend-http
        target: ${PORT:?Set PORT in frontend/.env.local}
        published: ${PORT:?Set PORT in frontend/.env.local}
        host_ip: ${HOST_BIND_ADDRESS:?Set HOST_BIND_ADDRESS in backend/.env}
        protocol: tcp
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /app/.next/cache:rw,noexec,nosuid,size=64m,uid=${APP_UID:-10001},gid=${APP_GID:-10001}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:' + process.env.PORT + '/login').then(response => {
            if (!response.ok) process.exit(1)
          }).catch(() => process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
